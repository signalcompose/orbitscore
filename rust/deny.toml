# cargo-deny config — OrbitScore Rust workspace.
#
# 主目的:
#   ① third-party crate に GPL/copyleft 等の非許諾 license が混入しないこと。
#   ② GPL 隔離 crate `orbit-link-audio`(GPL-2.0-or-later 明示・[workspace] exclude で
#      非 member)が **default 依存グラフに現れない** こと。permissive な engine core
#      (orbit-audio-core / -native / -wasm)が誤って依存すれば dep として graph に入り、
#      GPL が allow に無いため本 gate が fail する。
#
# 使い方:
#   default(link-audio off)で `cargo deny --manifest-path rust/Cargo.toml check licenses`
#   が pass する = default graph は GPL-free。`--features link-audio` では GPL が現れるのは
#   想定内(その graph では cargo-deny を回さない)。

[licenses]
# allow に無い license が graph に現れたら fail。GPL-2.0-or-later は意図的に非掲載。
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "CC0-1.0",
  "LicenseRef-Signal-compose-FairTrade-1.0",
]
confidence-threshold = 0.9

[bans]
# 同一 crate の複数バージョンは許容(別 PR でトリアージ)。
multiple-versions = "allow"

[advisories]
# RUSTSEC は警告に留める(セキュリティトリアージは別管理)。
yanked = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
